name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete Preview
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployment
        uses: actions/github-script@v9
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const workerName = 'dcln';
            const accountId = process.env.CF_ACCOUNT_ID;
            const apiToken = process.env.CF_API_TOKEN;

            if (!accountId || !apiToken) {
              core.warning('Cloudflare secrets not configured — skipping preview cleanup');
              return;
            }

            // Workers Versions API — list deployments for the worker
            const baseUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/workers/scripts/${workerName}/deployments`;
            const response = await fetch(baseUrl, {
              headers: { Authorization: `Bearer ${apiToken}` },
            });
            const data = await response.json();

            if (!data.success) {
              core.warning(`Failed to list deployments: ${JSON.stringify(data.errors)}`);
              return;
            }

            // Workers deployments don't have per-branch previews like Pages.
            // Cloudflare Pages preview cleanup is no longer needed after the
            // migration to Workers. This workflow is kept as a no-op placeholder
            // in case branch-based preview deployments are added in the future.
            core.info(`Preview cleanup skipped — Workers does not create per-branch previews (branch: ${branch})`);
